<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>タスク編集</title>

    <link rel="stylesheet" href="/css/task-form.css">
</head>

<body>

<div class="container">

    <h1>タスク編集</h1>

    <form th:action="@{/tasks/update/{id}(id=${task.id})}"
          method="post"
          th:object="${task}">

        <!-- タイトル -->
        <div class="form-group">

            <label>タイトル</label>

            <input type="text" th:field="*{title}">

            <div th:if="${#fields.hasErrors('title')}"
                 th:errors="*{title}"
                 class="error-message">
            </div>

        </div>

        <!-- 内容 -->
        <div class="form-group">

            <label>内容</label>

            <textarea rows="5"
                      th:field="*{content}">
            </textarea>

            <div th:if="${#fields.hasErrors('content')}"
                 th:errors="*{content}"
                 class="error-message">
            </div>

        </div>

        <!-- 登録者 -->
        <div class="form-group">

            <label>登録者</label>

            <input type="text" th:field="*{name}">

            <div th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}"
                 class="error-message">
            </div>

        </div>

		<!-- 開始日 -->
		<div class="form-group">

		    <label for="startDate">開始日</label>

		    <input type="date"
		           id="startDate"
		           th:field="*{startDate}">

		    <div th:if="${#fields.hasErrors('startDate')}"
		         th:errors="*{startDate}"
		         class="error-message">
		    </div>

		</div>

		<!-- 終了日 -->
		<div class="form-group">

		    <label for="endDate">終了日</label>

		    <input type="date"
		           id="endDate"
		           th:field="*{endDate}">

		    <div th:if="${#fields.hasErrors('endDate')}"
		         th:errors="*{endDate}"
		         class="error-message">
		    </div>

		    <div th:if="${#fields.hasErrors('validDateRange')}"
		         th:errors="*{validDateRange}"
		         class="error-message">
		    </div>

		</div>

        <!-- ボタン -->
        <div class="button-area">

            <button type="submit" class="update-btn">
                更新
            </button>

            <a href="/tasks" class="cancel-btn">
                ← キャンセル
            </a>

        </div>

    </form>

</div>

</body>
</html>
