<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ユーザー登録</title>

	<link rel="stylesheet" href="/css/style.css">
</head>

<body>

	<div class="form-container">

		<h1>ユーザー登録</h1>

		<form th:action="@{/register}" method="post" th:object="${userForm}" novalidate>

			<div class="form-group">

				<label>ユーザー名（半角英字）</label>

				<input type="text" th:field="*{username}">

				<p th:errors="*{username}" class="error-message">
				</p>

			</div>

			<div class="form-group">

				<label>パスワード（半角英数字）</label>

				<input type="password" th:field="*{password}">

				<p th:errors="*{password}" class="error-message">
				</p>

			</div>

			<!-- CSRFトークン -->
			<input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

			<button type="submit" class="form-btn register">

				登録

			</button>

		</form>

		<p class="link">
			<a href="/login">ログインはこちら</a>
		</p>

	</div>

</body>

</html>
